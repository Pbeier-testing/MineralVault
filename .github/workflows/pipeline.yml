name: MineralVault CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build --no-restore

      - name: Run Unit Tests
        run: dotnet test tests/MineralCollection.Tests.Unit/MineralCollection.Tests.Unit.csproj --no-build --verbosity normal --filter "TestLevel=Unit"

      - name: Run Integration Tests
        run: dotnet test tests/MineralCollection.Tests.Integration/MineralCollection.Tests.Integration.csproj --no-build --verbosity normal --filter "TestLevel=Integration"

      - name: Install Playwright Browsers
        run: pwsh tests/MineralCollection.Tests.E2E/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E Smoke Tests
        env:
          MINERALVAULT_E2E_BASE_URL: http://localhost:5119
          MINERALVAULT_DB_PATH: ${{ github.workspace }}/tests/MineralCollection.Tests.E2E/TestData/minerals.e2e.db
        run: |
          dotnet run --project src/MineralCollection.API/MineralCollection.API.csproj --no-build --urls http://localhost:5247 > api-e2e.log 2>&1 &
          dotnet run --project src/MineralCollection.Frontend/MineralCollection.Frontend.csproj --no-build --urls http://localhost:5119 > frontend-e2e.log 2>&1 &

          for i in {1..60}; do
            if curl --fail --silent http://localhost:5247/api/minerals > /dev/null && curl --fail --silent http://localhost:5119 > /dev/null; then
              break
            fi
            sleep 2
          done

          curl --fail http://localhost:5247/api/minerals || (cat api-e2e.log && exit 1)
          curl --fail http://localhost:5119 || (cat frontend-e2e.log && exit 1)

          dotnet test tests/MineralCollection.Tests.E2E/MineralCollection.Tests.E2E.csproj --no-build --verbosity normal --filter "TestLevel=E2E"
