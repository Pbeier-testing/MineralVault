name: MineralVault CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build --no-restore

      - name: Run Unit Tests
        run: dotnet test tests/MineralCollection.Tests.Unit/MineralCollection.Tests.Unit.csproj --no-build --verbosity normal --filter "TestLevel=Unit"

      - name: Run Integration Tests
        run: dotnet test tests/MineralCollection.Tests.Integration/MineralCollection.Tests.Integration.csproj --no-build --verbosity normal --filter "TestLevel=Integration"
